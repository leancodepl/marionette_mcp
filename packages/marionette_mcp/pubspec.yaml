name: marionette_mcp
description: MCP server that lets AI agents (Claude, Copilot, Cursor) inspect and interact with running Flutter apps — tap, scroll, type, and screenshot.
version: 0.4.0
repository: https://github.com/leancodepl/marionette_mcp
issue_tracker: https://github.com/leancodepl/marionette_mcp/issues
topics:
  - mcp
  - ai
  - claude
  - agent
  - copilot
resolution: workspace

executables:
  marionette_mcp: marionette_mcp

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  args: ^2.7.0
  logging: ^1.3.0
  mcp_dart: ^1.2.1
  vm_service: ">=14.0.0"

dev_dependencies:
  lints: ">=4.0.0"
  test: ">=1.24.0"
