name: marionette_cli
description: CLI that lets AI agents (Claude, Copilot, Cursor) inspect and interact with running Flutter apps — tap, scroll, type, and screenshot.
version: 0.4.0
repository: https://github.com/leancodepl/marionette_mcp
issue_tracker: https://github.com/leancodepl/marionette_mcp/issues
topics:
  - mcp
  - ai
  - claude
  - agent
  - copilot
resolution: workspace

executables:
  marionette: marionette

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  args: ^2.7.0
  logging: ^1.3.0
  marionette_mcp: ^0.4.0
  mcp_dart: ^1.2.1
  path: ^1.9.0
  vm_service: ^15.0.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.26.3
